name: Deploy China Mirror to Aliyun OSS CDN

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate workflow without uploading to OSS"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      rollback_release:
        description: "Optional release SHA under __releases/ to restore"
        required: false
        default: ""
  push:
    branches:
      - china-form-backend
    paths:
      - ".github/workflows/deploy-aliyun.yml"

permissions:
  contents: read

concurrency:
  group: aliyun-china-mirror
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, deploy, refresh, verify
    runs-on: ubuntu-latest
    environment: production
    env:
      ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
      ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
      ALIYUN_REGION: ${{ secrets.ALIYUN_REGION }}
      ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
      ALIYUN_OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
      ALIYUN_CDN_DOMAIN: ${{ secrets.ALIYUN_CDN_DOMAIN }}
      ALIYUN_OSS_PREFIX: ${{ vars.ALIYUN_OSS_PREFIX }}
      ALIYUN_CLI_PROFILE: magsnap-cn-mirror
      SITE_BASE_URL: https://cn.magsnap.me
      DEPLOY_VERIFY_BASE_URL: https://cn.magsnap.me
      DISALLOW_SERVER_CONTAINS: ${{ vars.DISALLOW_SERVER_CONTAINS }}
      LIGHTHOUSE_MIN_SCORE: ${{ vars.LIGHTHOUSE_MIN_SCORE }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' && 'true' || 'false' }}
      ROLLBACK_RELEASE: ${{ github.event_name == 'push' && '__repair_static_cdn__' || (github.event_name == 'workflow_dispatch' && inputs.rollback_release || '') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set defaults
        shell: bash
        run: |
          echo "SITE_BASE_URL=https://cn.magsnap.me" >> "$GITHUB_ENV"
          echo "DEPLOY_VERIFY_BASE_URL=https://cn.magsnap.me" >> "$GITHUB_ENV"
          echo "DISALLOW_SERVER_CONTAINS=${DISALLOW_SERVER_CONTAINS:-GitHub.com}" >> "$GITHUB_ENV"
          echo "LIGHTHOUSE_MIN_SCORE=${LIGHTHOUSE_MIN_SCORE:-0.95}" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare static package
        run: python3 scripts/deploy/prepare_static_site.py --source . --output dist

      - name: Verify static package
        run: python3 scripts/deploy/verify_static_site.py --site-dir dist --json-output deployment_static_check.json

      - name: Generate China compatibility report
        run: python3 scripts/deploy/china_compatibility_report.py --root . --base-url "$SITE_BASE_URL" --output china_compatibility_report.md

      - name: Generate static performance report
        run: python3 scripts/deploy/performance_report.py --site-dir dist --base-url "$SITE_BASE_URL" --output performance_report.md

      - name: Upload pre-deploy reports
        uses: actions/upload-artifact@v4
        with:
          name: pre-deploy-reports
          path: |
            deployment_static_check.json
            china_compatibility_report.md
            performance_report.md
            dist/deployment_manifest.json

      - name: Validate Aliyun configuration
        if: env.DRY_RUN != 'true'
        shell: bash
        run: |
          : "${ALIYUN_ACCESS_KEY_ID:?Missing GitHub Secret ALIYUN_ACCESS_KEY_ID}"
          : "${ALIYUN_ACCESS_KEY_SECRET:?Missing GitHub Secret ALIYUN_ACCESS_KEY_SECRET}"
          : "${ALIYUN_REGION:?Missing GitHub Secret ALIYUN_REGION}"
          : "${ALIYUN_OSS_BUCKET:?Missing GitHub Secret ALIYUN_OSS_BUCKET}"
          : "${ALIYUN_OSS_ENDPOINT:?Missing GitHub Secret ALIYUN_OSS_ENDPOINT}"
          : "${ALIYUN_CDN_DOMAIN:?Missing GitHub Secret ALIYUN_CDN_DOMAIN}"
          if [ "$ALIYUN_OSS_BUCKET" != "magsnap-cn-mirror" ]; then
            echo "ALIYUN_OSS_BUCKET must be magsnap-cn-mirror for the China mirror workflow."
            exit 1
          fi
          if [ "$ALIYUN_CDN_DOMAIN" != "cn.magsnap.me" ]; then
            echo "ALIYUN_CDN_DOMAIN must be cn.magsnap.me. Do not deploy the Aliyun mirror workflow to magsnap.me or www.magsnap.me."
            exit 1
          fi

      - name: Install Alibaba Cloud CLI
        if: env.DRY_RUN != 'true'
        shell: bash
        run: |
          curl -fsSL https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz -o aliyun-cli.tgz
          tar -xzf aliyun-cli.tgz
          sudo mv aliyun /usr/local/bin/aliyun
          aliyun version

      - name: Install ossutil
        if: env.DRY_RUN != 'true'
        shell: bash
        run: |
          curl -fsSL https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash
          ossutil --version

      - name: Configure Alibaba Cloud CLI
        if: env.DRY_RUN != 'true'
        shell: bash
        run: |
          aliyun configure set \
            --profile "$ALIYUN_CLI_PROFILE" \
            --mode AK \
            --region "$ALIYUN_REGION" \
            --access-key-id "$ALIYUN_ACCESS_KEY_ID" \
            --access-key-secret "$ALIYUN_ACCESS_KEY_SECRET"

      - name: Diagnose Aliyun CDN
        if: env.DRY_RUN != 'true' && env.ROLLBACK_RELEASE == '__diagnose__'
        shell: bash
        run: |
          aliyun cdn DescribeCdnDomainDetail \
            --profile "$ALIYUN_CLI_PROFILE" \
            --DomainName "$ALIYUN_CDN_DOMAIN" \
            > domain_detail.json
          python3 - <<'PY'
          import json
          data = json.load(open("domain_detail.json"))
          detail = data.get("GetDomainDetailModel", data)
          keep = {
              "DomainName": detail.get("DomainName"),
              "DomainStatus": detail.get("DomainStatus"),
              "Cname": detail.get("Cname"),
              "Scope": detail.get("Scope"),
              "Sources": detail.get("Sources"),
          }
          print(json.dumps(keep, indent=2, ensure_ascii=False))
          PY
          echo "::group::full domain detail"
          python3 - <<'PY'
          import json
          data = json.load(open("domain_detail.json"))
          print(json.dumps(data, indent=2, ensure_ascii=False))
          PY
          echo "::endgroup::"
          echo "::group::domain configs"
          aliyun cdn DescribeCdnDomainConfigs \
            --profile "$ALIYUN_CLI_PROFILE" \
            --DomainName "$ALIYUN_CDN_DOMAIN" \
            > domain_configs.json \
            || true
          cat domain_configs.json
          echo "::endgroup::"
          echo "::group::diagnostic summary"
          python3 - <<'PY'
          import json
          import os

          endpoint = os.environ["ALIYUN_OSS_ENDPOINT"].removeprefix("https://").removeprefix("http://").strip("/")
          expected_origin = f"{os.environ['ALIYUN_OSS_BUCKET']}.{endpoint}"
          cdn_domain = os.environ["ALIYUN_CDN_DOMAIN"]

          detail = json.load(open("domain_detail.json")).get("GetDomainDetailModel", {})
          source_models = detail.get("SourceModels", {}).get("SourceModel", [])
          configs = json.load(open("domain_configs.json")).get("DomainConfigs", {}).get("DomainConfig", [])

          summary = {
              "expected_origin_config": {
                  "bucket_matches_cn_mirror": os.environ["ALIYUN_OSS_BUCKET"] == "magsnap-cn-mirror",
                  "endpoint_matches_cn_hangzhou": endpoint == "oss-cn-hangzhou.aliyuncs.com",
              },
              "sources": [],
              "functions": [],
          }

          for source in source_models:
              content = source.get("Content", "")
              summary["sources"].append({
                  "type": source.get("Type"),
                  "enabled": source.get("Enabled"),
                  "port": source.get("Port"),
                  "priority": source.get("Priority"),
                  "weight": source.get("Weight"),
                  "content_matches_expected_origin": content == expected_origin,
                  "content_matches_cdn_domain": content == cdn_domain,
              })

          for config in configs:
              function_name = config.get("FunctionName")
              args = {
                  item.get("ArgName"): item.get("ArgValue")
                  for item in config.get("FunctionArgs", {}).get("FunctionArg", [])
              }
              item = {
                  "function_name": function_name,
                  "config_id": config.get("ConfigId"),
                  "status": config.get("Status"),
              }
              if function_name == "set_req_host_header":
                  host = args.get("domain_name")
                  item.update({
                      "host_matches_expected_origin": host == expected_origin,
                      "host_matches_cdn_domain": host == cdn_domain,
                  })
              if function_name == "oss_auth":
                  item["oss_auth_enabled"] = True
              summary["functions"].append(item)

          print(json.dumps(summary, indent=2, ensure_ascii=False))
          PY
          echo "::endgroup::"
          set +e
          for url in \
            "http://cn.magsnap.me/" \
            "http://cn.magsnap.me/index.html" \
            "https://cn.magsnap.me/" \
            "https://cn.magsnap.me/index.html" \
            "http://magsnap-cn-mirror.oss-cn-hangzhou.aliyuncs.com/index.html"
          do
            echo "::group::curl $url"
            curl -sS -v -I --max-time 25 "$url"
            echo "exit=$?"
            echo "::endgroup::"
          done

      - name: Disable private OSS origin auth
        if: env.DRY_RUN != 'true' && env.ROLLBACK_RELEASE == '__disable_oss_auth__'
        shell: bash
        run: |
          aliyun cdn DescribeCdnDomainConfigs \
            --profile "$ALIYUN_CLI_PROFILE" \
            --DomainName "$ALIYUN_CDN_DOMAIN" \
            > domain_configs.json
          delete_ids="$(python3 - <<'PY'
          import json

          configs = json.load(open("domain_configs.json")).get("DomainConfigs", {}).get("DomainConfig", [])
          ids = [
              str(config["ConfigId"])
              for config in configs
              if config.get("FunctionName") == "oss_auth" and config.get("ConfigId")
          ]
          print(",".join(ids))
          PY
          )"
          if [ -z "$delete_ids" ]; then
            echo "No oss_auth config found."
            exit 0
          fi
          echo "Deleting oss_auth config ids: $delete_ids"
          aliyun cdn DeleteSpecificConfig \
            --profile "$ALIYUN_CLI_PROFILE" \
            --DomainName "$ALIYUN_CDN_DOMAIN" \
            --ConfigId "$delete_ids"

      - name: Repair static CDN edge config
        if: env.DRY_RUN != 'true' && env.ROLLBACK_RELEASE == '__repair_static_cdn__'
        shell: bash
        run: |
          aliyun cdn DescribeCdnDomainConfigs \
            --profile "$ALIYUN_CLI_PROFILE" \
            --DomainName "$ALIYUN_CDN_DOMAIN" \
            > domain_configs.json
          delete_ids="$(python3 - <<'PY'
          import json

          static_mirror_blockers = {
              "p2pqos",
              "cc_defense",
              "consistent_hash",
          }
          configs = json.load(open("domain_configs.json")).get("DomainConfigs", {}).get("DomainConfig", [])
          selected = [
              (config.get("FunctionName"), str(config["ConfigId"]))
              for config in configs
              if config.get("FunctionName") in static_mirror_blockers and config.get("ConfigId")
          ]
          if selected:
              print(",".join(config_id for _, config_id in selected))
              print(
                  "Selected CDN configs for deletion: "
                  + ", ".join(f"{name}:{config_id}" for name, config_id in selected),
                  file=__import__("sys").stderr,
              )
          PY
          )"
          if [ -z "$delete_ids" ]; then
            echo "No static CDN blocker configs found."
            exit 0
          fi
          aliyun cdn DeleteSpecificConfig \
            --profile "$ALIYUN_CLI_PROFILE" \
            --DomainName "$ALIYUN_CDN_DOMAIN" \
            --ConfigId "$delete_ids"

      - name: Deploy to OSS
        if: env.DRY_RUN != 'true' && env.ROLLBACK_RELEASE == ''
        run: python3 scripts/deploy/deploy_to_aliyun.py --site-dir dist --release "$GITHUB_SHA"

      - name: Rollback OSS release
        if: env.DRY_RUN != 'true' && env.ROLLBACK_RELEASE != '' && env.ROLLBACK_RELEASE != '__diagnose__' && env.ROLLBACK_RELEASE != '__disable_oss_auth__' && env.ROLLBACK_RELEASE != '__repair_static_cdn__'
        run: python3 scripts/deploy/rollback_aliyun.py --release "$ROLLBACK_RELEASE"

      - name: Refresh Aliyun CDN
        if: env.DRY_RUN != 'true' && env.ROLLBACK_RELEASE != '__diagnose__'
        run: python3 scripts/deploy/refresh_cdn.py --domain "$ALIYUN_CDN_DOMAIN"

      - name: Wait for CDN propagation
        if: env.DRY_RUN != 'true' && env.ROLLBACK_RELEASE != '__diagnose__'
        run: sleep 60

      - name: Verify live deployment
        if: env.DRY_RUN != 'true' && env.ROLLBACK_RELEASE != '__diagnose__'
        run: |
          python3 scripts/deploy/verify_deployment.py \
            --base-url "$DEPLOY_VERIFY_BASE_URL" \
            --disallow-server "$DISALLOW_SERVER_CONTAINS" \
            --json-output deployment_live_check.json

      - name: Run Lighthouse
        if: env.DRY_RUN != 'true' && env.ROLLBACK_RELEASE != '__diagnose__'
        shell: bash
        run: |
          mkdir -p deployment-artifacts
          npx --yes lighthouse "$DEPLOY_VERIFY_BASE_URL" \
            --chrome-flags="--headless --no-sandbox" \
            --only-categories=performance,accessibility,best-practices,seo \
            --output=json \
            --output=html \
            --output-path=deployment-artifacts/lighthouse-home

      - name: Generate Lighthouse performance report
        if: env.DRY_RUN != 'true' && env.ROLLBACK_RELEASE != '__diagnose__'
        run: |
          python3 scripts/deploy/performance_report.py \
            --site-dir dist \
            --base-url "$DEPLOY_VERIFY_BASE_URL" \
            --lighthouse-json deployment-artifacts/lighthouse-home.report.json \
            --output deployment-artifacts/performance_report.md \
            --min-score "$LIGHTHOUSE_MIN_SCORE" \
            --enforce-lighthouse

      - name: Upload post-deploy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-v2-reports
          path: |
            deployment_live_check.json
            deployment-artifacts/
            china_compatibility_report.md
            performance_report.md
          if-no-files-found: ignore
