name: Diagnose Aliyun China Mirror CDN

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    name: Read CDN config and probe mirror
    runs-on: ubuntu-latest
    environment: production
    env:
      ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
      ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
      ALIYUN_REGION: ${{ secrets.ALIYUN_REGION }}
      ALIYUN_CDN_DOMAIN: ${{ secrets.ALIYUN_CDN_DOMAIN }}
      ALIYUN_CLI_PROFILE: magsnap-cn-mirror

    steps:
      - name: Validate target
        shell: bash
        run: |
          : "${ALIYUN_ACCESS_KEY_ID:?Missing GitHub Secret ALIYUN_ACCESS_KEY_ID}"
          : "${ALIYUN_ACCESS_KEY_SECRET:?Missing GitHub Secret ALIYUN_ACCESS_KEY_SECRET}"
          : "${ALIYUN_REGION:?Missing GitHub Secret ALIYUN_REGION}"
          : "${ALIYUN_CDN_DOMAIN:?Missing GitHub Secret ALIYUN_CDN_DOMAIN}"
          if [ "$ALIYUN_CDN_DOMAIN" != "cn.magsnap.me" ]; then
            echo "This diagnostic is only allowed for cn.magsnap.me."
            exit 1
          fi

      - name: Install Alibaba Cloud CLI
        shell: bash
        run: |
          curl -fsSL https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz -o aliyun-cli.tgz
          tar -xzf aliyun-cli.tgz
          sudo mv aliyun /usr/local/bin/aliyun
          aliyun version

      - name: Configure Alibaba Cloud CLI
        shell: bash
        run: |
          aliyun configure set \
            --profile "$ALIYUN_CLI_PROFILE" \
            --mode AK \
            --region "$ALIYUN_REGION" \
            --access-key-id "$ALIYUN_ACCESS_KEY_ID" \
            --access-key-secret "$ALIYUN_ACCESS_KEY_SECRET"

      - name: Read CDN domain detail
        shell: bash
        run: |
          aliyun cdn DescribeCdnDomainDetail \
            --profile "$ALIYUN_CLI_PROFILE" \
            --DomainName "$ALIYUN_CDN_DOMAIN" \
            > domain_detail.json
          python3 - <<'PY'
          import json
          data = json.load(open("domain_detail.json"))
          detail = data.get("GetDomainDetailModel", data)
          keep = {
              "DomainName": detail.get("DomainName"),
              "DomainStatus": detail.get("DomainStatus"),
              "Cname": detail.get("Cname"),
              "Scope": detail.get("Scope"),
              "ResourceGroupId": detail.get("ResourceGroupId"),
              "Sources": detail.get("Sources"),
          }
          print(json.dumps(keep, indent=2, ensure_ascii=False))
          PY

      - name: Probe live endpoints
        shell: bash
        run: |
          set +e
          for url in \
            "http://cn.magsnap.me/" \
            "http://cn.magsnap.me/index.html" \
            "https://cn.magsnap.me/" \
            "https://cn.magsnap.me/index.html" \
            "http://magsnap-cn-mirror.oss-cn-hangzhou.aliyuncs.com/index.html"
          do
            echo "::group::curl $url"
            curl -sS -v -I --max-time 25 "$url"
            echo "exit=$?"
            echo "::endgroup::"
          done
