<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MAGSNAP 创始人跳转 / Founder Redirect</title>
  <meta name="robots" content="noindex">
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, "Avenir Next", "Helvetica Neue", Arial, sans-serif;
      --paper: #f5efe6;
      --kraft: #c8a97e;
      --pink: #ff5c9a;
      --black: #000;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      display: grid;
      place-items: center;
      background: var(--black);
      color: var(--paper);
      padding: 24px;
    }

    .card {
      width: min(100%, 520px);
      border: 1px solid rgba(245, 239, 230, 0.14);
      background: rgba(255, 255, 255, 0.04);
      padding: 28px 24px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-family: "Arial Black", Impact, sans-serif;
      font-size: clamp(34px, 10vw, 58px);
      line-height: 0.92;
      text-transform: uppercase;
    }

    p {
      margin: 14px 0 0;
      color: rgba(245, 239, 230, 0.74);
      line-height: 1.5;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 20px;
      min-height: 48px;
      padding: 0 18px;
      border: 1px solid rgba(200, 169, 126, 0.4);
      color: var(--paper);
      text-decoration: none;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    a::before {
      content: "";
      width: 8px;
      height: 8px;
      margin-right: 10px;
      border-radius: 50%;
      background: var(--pink);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>创始人 / Founder</h1>
    <p>正在跳转到 MAGSNAP Founder 申请页面。<br>Redirecting to the MAGSNAP Founder survey.</p>
    <a href="../#founder">打开 Founder 问卷 / Open Founder Survey</a>
  </main>
  <script>
    const target = `../${window.location.search}#founder`;
    window.location.replace(target);
  </script>
</body>
</html>
